# ============================================================
# Subhuti 配置文件
# ============================================================
# 优先级：环境变量 > 此文件 > 代码默认值
# ============================================================

[llm]
# LLM 提供商: doubao, openai, ollama
provider = "doubao"
model = "doubao-seed-2-0-lite-260215"
api_url = "https://ark.cn-beijing.volces.com/api/v3/responses"
# api_key 建议通过环境变量 DOUBAO_API_KEY 设置，不要写在此文件中
temperature = 0.7
max_tokens = 2048

[database]
host = "localhost"
port = 5432
database = "postgres"
username = "postgres"
# password 建议通过环境变量 DB_PASSWORD 设置
password = "123456"
max_connections = 10

[http]
addr = "0.0.0.0:8080"

[logging]
# 日志级别: trace, debug, info, warn, error
level = "info"
# 日志目录
dir = "./logs"

[memory]
# 短期记忆最大条数
short_term_limit = 50
# 归档阈值（交互次数）
archive_threshold = 100

[soul]
# 人格演化间隔（交互次数）
evolve_interval = 50
# 重要性阈值
importance_threshold = 0.6

[test_mode]
# 是否启用测试模式（启用后使用 Mock LLM 替代真实 LLM）
enabled = true
# Mock 响应延迟（毫秒），模拟 LLM 调用耗时
mock_delay_ms = 3000
# Mock 响应数据文件路径
mock_responses_path = "config/mock_responses.json"
